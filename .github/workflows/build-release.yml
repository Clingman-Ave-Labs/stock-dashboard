name: Build & Release Firmware

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Install Heltec ESP32 core
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            "https://github.com/Heltec-Aaron-Lee/WiFi_Kit_series/releases/latest/download/package_heltec_esp32_index.json"
          arduino-cli core update-index
          arduino-cli core install heltec-esp32:esp32

      - name: Install libraries
        run: |
          arduino-cli lib install "heltec-eink-modules"
          arduino-cli lib install "ArduinoJson"

      - name: Compile firmware
        run: |
          arduino-cli compile \
            --fqbn heltec-esp32:esp32:HTIT-VME290 \
            --output-dir ./build \
            StockDashboard_v1_21/StockDashboard_v1_21.ino

      - name: Rename binary
        run: cp ./build/StockDashboard_v1_21.ino.bin ./build/firmware.bin

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Firmware
          body: |
            Auto-built firmware from the latest commit on `main`.
            Flash via OTA from the device config portal, or download `firmware.bin` for manual flashing.
          files: ./build/firmware.bin
          make_latest: true
